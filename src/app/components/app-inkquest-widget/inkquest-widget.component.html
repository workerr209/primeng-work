<div class="card !mb-8 inkquest-widget flex flex-col">

    <!-- Header -->
    <div class="flex items-start justify-between gap-3 mb-5">
        <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-xl bg-primary-500/15 flex items-center justify-center shrink-0">
                <i class="pi pi-pencil text-primary-500"></i>
            </div>
            <div class="min-w-0">
                <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0 truncate">Ink Quest</h2>
                <p class="text-xs text-muted-color m-0 truncate">Today's writing snapshot</p>
            </div>
        </div>
        <p-button
            *ngIf="showRedirectButton && state === 'loaded'"
            [routerLink]="inkquestRoute"
            label="View overview"
            iconPos="right"
            [fluid]="false"
            size="small"
            variant="outlined">
        </p-button>
    </div>

    <!-- ── Loading skeleton ─────────────────────────────── -->
    <ng-container *ngIf="state === 'loading' && showSkeleton">
        <div class="widget-rings-skeleton mb-5">
            <div class="widget-rings-hero">
                <p-skeleton shape="circle" size="7.5rem"></p-skeleton>
                <p-skeleton width="5.5rem" height="0.65rem"></p-skeleton>
                <p-skeleton width="7rem" height="0.6rem"></p-skeleton>
            </div>
            <div class="widget-rings-metrics">
                <div *ngFor="let _ of [1,2]" class="widget-rings-metric">
                    <div class="flex justify-between items-center mb-2">
                        <p-skeleton width="3.5rem" height="0.6rem"></p-skeleton>
                        <p-skeleton width="2.5rem" height="0.85rem"></p-skeleton>
                    </div>
                    <p-skeleton width="100%" height="0.4rem" borderRadius="999px"></p-skeleton>
                    <p-skeleton width="5rem" height="0.6rem" styleClass="mt-2"></p-skeleton>
                </div>
            </div>
        </div>
        <!-- Project progress skeleton -->
        <div class="rounded-2xl border border-surface-200 dark:border-surface-700 p-4 bg-surface-50 dark:bg-surface-900/40">
            <p-skeleton width="6rem" height="0.65rem" styleClass="mb-2"></p-skeleton>
            <p-skeleton width="60%" height="1rem" styleClass="mb-3"></p-skeleton>
            <p-skeleton width="100%" height="0.5rem" styleClass="mb-2"></p-skeleton>
            <div class="flex justify-between">
                <p-skeleton width="6rem" height="0.65rem"></p-skeleton>
                <p-skeleton width="8rem" height="0.65rem"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <!-- ── Empty state ──────────────────────────────────── -->
    <ng-container *ngIf="state === 'empty'">
        <div class="flex-1 flex flex-col items-center justify-center text-center px-4 py-10 gap-3">
            <div class="w-16 h-16 rounded-2xl bg-surface-100 dark:bg-surface-800 flex items-center justify-center shadow-inner">
                <i class="pi pi-book text-3xl text-surface-400"></i>
            </div>
            <h3 class="text-base font-semibold text-surface-900 dark:text-surface-0 m-0">
                Nothing logged today
            </h3>
            <p class="text-sm text-muted-color m-0 max-w-xs">
                Log your session to see today's stats.
            </p>
            <p-button
                label="Open Ink Quest"
                [routerLink]="inkquestRoute"
                [fluid]="false"
                size="small"
                variant="outlined">
            </p-button>
        </div>
    </ng-container>

    <!-- ── Error state ──────────────────────────────────── -->
    <ng-container *ngIf="state === 'error'">
        <div class="flex-1 flex flex-col items-center justify-center text-center px-4 py-10 gap-3">
            <div class="w-16 h-16 rounded-2xl bg-red-500/10 flex items-center justify-center">
                <i class="pi pi-exclamation-triangle text-3xl text-red-500"></i>
            </div>
            <h3 class="text-base font-semibold text-surface-900 dark:text-surface-0 m-0">
                Couldn't load Ink Quest
            </h3>
            <p-button label="Retry" variant="text" [fluid]="false" (click)="reload()"></p-button>
        </div>
    </ng-container>

    <!-- ── Loaded state ─────────────────────────────────── -->
    <ng-container *ngIf="state === 'loaded' && summary as s">

        <!-- Rings via shared component -->
        <app-inkquest-rings [summary]="s" [embedded]="true" [compact]="true" class="mb-5 block"></app-inkquest-rings>

        <!-- Current project progress — click to open project detail -->
        <a *ngIf="s.currentProject as proj"
             [routerLink]="[inkquestRoute + '/projects', proj.id]"
             class="project-card-link rounded-2xl border border-surface-200 dark:border-surface-700 p-4 bg-surface-50 dark:bg-surface-900/40 block no-underline">
            <div class="flex items-center justify-between mb-2">
                <span class="text-[10px] uppercase tracking-widest text-muted-color font-bold">
                    Current Project
                </span>
                <span class="text-xs font-bold text-primary-500">{{ proj.progressPercent }}%</span>
            </div>
            <h4 class="text-sm font-semibold text-surface-900 dark:text-surface-0 m-0 mb-3 truncate">
                {{ proj.title }}
            </h4>
            <div class="h-2 bg-surface-200 dark:bg-surface-700 rounded-full overflow-hidden mb-2">
                <div class="h-full rounded-full bg-primary-500 transition-all duration-700 ease-out"
                     [style.width.%]="proj.progressPercent"></div>
            </div>
            <div class="flex justify-between items-center text-xs text-muted-color gap-2">
                <span class="truncate">{{ proj.finishedChapters }} / {{ proj.totalChapters }} chapters</span>
                <span *ngIf="s.currentChapter" class="truncate text-right">
                    Working on {{ s.currentChapter.title }}
                </span>
            </div>
        </a>

    </ng-container>

</div>
