<div class="inkquest-projects">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Projects</h1>
            <p class="text-sm text-muted-color m-0 mt-1">รายการนิยายทั้งหมดของคุณ</p>
        </div>
        <div class="flex gap-2 items-center">
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText [(ngModel)]="search" placeholder="ค้นหา..." />
            </span>
            <button pButton pRipple icon="pi pi-plus" label="New Project" (click)="openNewDialog()"></button>
        </div>
    </div>

    <!-- Loading -->
    <ng-container *ngIf="state === 'loading'">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div *ngFor="let _ of [1,2,3,4,5,6]" class="card !mb-0">
                <p-skeleton width="100%" height="10rem" styleClass="mb-3"></p-skeleton>
                <p-skeleton width="60%" height="1rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="40%" height="0.7rem" styleClass="mb-3"></p-skeleton>
                <p-skeleton width="100%" height="0.5rem"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <!-- Empty -->
    <ng-container *ngIf="state === 'empty'">
        <div class="card flex flex-col items-center justify-center text-center py-16 gap-3">
            <div class="w-20 h-20 rounded-2xl bg-surface-100 dark:bg-surface-800 flex items-center justify-center">
                <i class="pi pi-book text-4xl text-surface-400"></i>
            </div>
            <h2 class="text-xl font-bold m-0">No projects yet</h2>
            <p class="text-sm text-muted-color m-0 max-w-md">เริ่มต้นนิยายเรื่องแรกของคุณวันนี้</p>
            <button pButton pRipple icon="pi pi-plus" label="Create your first project" class="mt-2" (click)="openNewDialog()"></button>
        </div>
    </ng-container>

    <!-- Error -->
    <ng-container *ngIf="state === 'error'">
        <div class="card flex flex-col items-center justify-center text-center py-16 gap-3">
            <div class="w-20 h-20 rounded-2xl bg-red-500/10 flex items-center justify-center">
                <i class="pi pi-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <h2 class="text-xl font-bold m-0">Couldn't load projects</h2>
            <button pButton pRipple icon="pi pi-refresh" label="Retry" class="p-button-text mt-2" (click)="reload()"></button>
        </div>
    </ng-container>

    <!-- Loaded -->
    <ng-container *ngIf="state === 'loaded'">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div *ngFor="let p of filtered()"
                 class="project-card card !mb-0 cursor-pointer"
                 (click)="open(p)">
                <div class="cover" [style.background-image]="'url(' + coverFallback(p) + ')'"></div>
                <h3 class="text-base font-bold text-surface-900 dark:text-surface-0 m-0 mt-3 mb-1 truncate">
                    {{ p.title }}
                </h3>
                <p class="text-xs text-muted-color m-0 mb-3 truncate">
                    {{ p.finishedChapters }}/{{ p.totalChapters }} ตอน
                </p>
                <div class="h-2 bg-surface-200 dark:bg-surface-700 rounded-full overflow-hidden mb-2">
                    <div class="h-full rounded-full transition-all duration-500"
                         [style.width.%]="p.progressPercent"
                         [style.background-color]="progressColor(p)"></div>
                </div>
                <div class="flex justify-between items-center text-xs">
                    <span class="text-muted-color">อัปเดต {{ p.updatedAt | date:'d MMM yyyy' }}</span>
                    <span class="font-bold" [style.color]="progressColor(p)">{{ p.progressPercent }}%</span>
                </div>
            </div>
        </div>

        <div *ngIf="filtered().length === 0" class="card flex flex-col items-center justify-center text-center py-12">
            <i class="pi pi-search text-3xl text-surface-400 mb-2"></i>
            <p class="text-sm text-muted-color m-0">ไม่พบโปรเจกต์ที่ตรงกับ "{{ search }}"</p>
        </div>
    </ng-container>

</div>

<!-- New Project Dialog -->
<p-dialog [(visible)]="showDialog" [modal]="true" [draggable]="false" header="New Project" [style]="{ width: '32rem' }">
    <div class="flex flex-col gap-4">
        <div>
            <label class="text-xs font-semibold mb-1.5 block">ชื่อเรื่อง</label>
            <input pInputText [(ngModel)]="draft.title" class="w-full" placeholder="เช่น รักร้ายของนายมาเฟีย" />
        </div>
        <div>
            <label class="text-xs font-semibold mb-1.5 block">จำนวนตอนทั้งหมด</label>
            <p-inputNumber [(ngModel)]="draft.totalChapters" [min]="1" styleClass="w-full" inputStyleClass="w-full"></p-inputNumber>
        </div>
        <div>
            <label class="text-xs font-semibold mb-1.5 block">สรุปเรื่องย่อ</label>
            <textarea pTextarea [(ngModel)]="draft.summary" rows="3" class="w-full" placeholder="เนื้อหาคร่าวๆ..."></textarea>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <button pButton pRipple label="ยกเลิก" class="p-button-text" (click)="showDialog = false"></button>
        <button pButton pRipple icon="pi pi-check" label="บันทึก" [loading]="saving" (click)="save()"></button>
    </ng-template>
</p-dialog>
