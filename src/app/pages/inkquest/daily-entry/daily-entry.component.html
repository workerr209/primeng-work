<div class="inkquest-daily-entry">

    <!-- Header — Back button on the LEFT -->
    <div class="flex flex-wrap items-center gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">
                {{ isToday ? "Today's Entry" : (isEditing ? 'Edit Entry' : 'Past Entry') }}
            </h1>
            <p class="text-sm text-muted-color m-0 mt-0.5">{{ targetDate | date:'EEEE, d MMMM yyyy' }}</p>
        </div>
    </div>

    <!-- Loading -->
    <ng-container *ngIf="state === 'loading'">
        <div class="card grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
            <div *ngFor="let _ of [1,2,3]" class="flex flex-col items-center gap-2 p-4 border border-surface-200 dark:border-surface-700 rounded-xl">
                <p-skeleton width="5rem" height="0.7rem"></p-skeleton>
                <p-skeleton width="8rem" height="2.5rem"></p-skeleton>
                <p-skeleton width="3rem" height="0.6rem"></p-skeleton>
            </div>
        </div>
        <div class="card grid grid-cols-1 md:grid-cols-2 gap-5">
            <div *ngFor="let _ of [1,2]">
                <p-skeleton width="6rem" height="0.7rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="100%" height="2.5rem"></p-skeleton>
            </div>
            <div class="md:col-span-2">
                <p-skeleton width="5rem" height="0.7rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="100%" height="5rem"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <!-- Error -->
    <ng-container *ngIf="state === 'error'">
        <div class="card flex flex-col items-center justify-center py-16 text-center gap-3">
            <div class="w-20 h-20 rounded-2xl bg-red-500/10 flex items-center justify-center">
                <i class="pi pi-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <p class="text-sm text-muted-color m-0">Couldn't load data</p>
            <p-button label="Retry" icon="pi pi-refresh" variant="text" (click)="reload()" [fluid]="false"></p-button>
        </div>
    </ng-container>

    <!-- Loaded -->
    <ng-container *ngIf="state === 'loaded'">

        <!-- Stat inputs -->
        <div class="stat-inputs card !mb-6">

            <!-- Words -->
            <div class="stat-field">
                <span class="stat-emoji">📝</span>
                <label class="stat-label">Words Written</label>
                <p-inputNumber
                    [(ngModel)]="entry.words"
                    [min]="0"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="0">
                </p-inputNumber>
                <span class="stat-unit">
                    words<ng-container *ngIf="goals?.dailyWords"> / goal {{ goals!.dailyWords | number }}</ng-container>
                </span>
                <div *ngIf="goals?.dailyWords" class="goal-bar w-full">
                    <div class="goal-fill" [style.width.%]="wordProgress"
                         [style.background-color]="wordProgress >= 100 ? '#10b981' : '#3b82f6'"></div>
                </div>
                <span *ngIf="goals?.dailyWords" class="stat-pct"
                      [style.color]="wordProgress >= 100 ? '#10b981' : 'var(--text-color-secondary)'">
                    {{ wordProgress }}%
                </span>
            </div>

            <!-- Focus -->
            <div class="stat-field">
                <span class="stat-emoji">⏱</span>
                <label class="stat-label">Focus Time</label>
                <p-inputNumber
                    [(ngModel)]="entry.focusMinutes"
                    [min]="0"
                    [max]="480"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="0">
                </p-inputNumber>
                <span class="stat-unit">
                    min<ng-container *ngIf="goals?.dailyFocus"> / goal {{ goals!.dailyFocus }}</ng-container>
                </span>
                <div *ngIf="goals?.dailyFocus" class="goal-bar w-full">
                    <div class="goal-fill" [style.width.%]="focusProgress"
                         [style.background-color]="focusProgress >= 100 ? '#10b981' : '#8b5cf6'"></div>
                </div>
                <span *ngIf="goals?.dailyFocus" class="stat-pct"
                      [style.color]="focusProgress >= 100 ? '#10b981' : 'var(--text-color-secondary)'">
                    {{ focusProgress }}%
                </span>
            </div>

            <!-- Sessions -->
            <div class="stat-field">
                <span class="stat-emoji">🔁</span>
                <label class="stat-label">Sessions</label>
                <p-inputNumber
                    [(ngModel)]="entry.sessions"
                    [min]="1"
                    [max]="20"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="1">
                </p-inputNumber>
                <span class="stat-unit">sessions</span>
            </div>

        </div>

        <!-- Chapter + Flow -->
        <div class="card !mb-6 grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="text-xs font-semibold mb-1.5 block">Current Chapter</label>
                <p-select
                    [(ngModel)]="entry.chapterId"
                    [options]="chapterOptions"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Select chapter (optional)"
                    [filter]="chapterOptions.length > 5"
                    styleClass="w-full">
                </p-select>
            </div>
            <div>
                <label class="text-xs font-semibold mb-1.5 block">Writing Flow</label>
                <div class="flow-row">
                    <button
                        *ngFor="let f of flowOptions"
                        type="button"
                        class="flow-btn"
                        [class.active]="entry.flow === f.value"
                        (click)="setFlow(f.value)">
                        <span class="text-xl">{{ f.emoji }}</span>
                        <span class="text-xs font-semibold">{{ f.label }}</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Note -->
        <div class="card !mb-6">
            <label class="text-xs font-semibold mb-1.5 block">Session Notes</label>
            <textarea
                pTextarea
                [(ngModel)]="entry.note"
                rows="5"
                class="w-full"
                placeholder="How did it go? Any ideas, blockers, or highlights from today's session...">
            </textarea>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3">
            <p-button label="Cancel" outlined (click)="back()" [fluid]="false"></p-button>
            <p-button
                icon="pi pi-save"
                [label]="isEditing ? 'Save Changes' : 'Save Entry'"
                [loading]="saving"
                (click)="submit()"
                [fluid]="false">
            </p-button>
        </div>
    </ng-container>

</div>
