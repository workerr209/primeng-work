<div class="inkquest-daily-entry">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">
                {{ isToday ? 'บันทึกวันนี้' : (isEditing ? 'แก้ไขรายการ' : 'บันทึกย้อนหลัง') }}
            </h1>
            <p class="text-sm text-muted-color m-0 mt-1">{{ targetDate | date:'EEEE, d MMMM yyyy' }}</p>
        </div>
        <p-button label="Back" (click)="back()" [fluid]="false" outlined></p-button>
    </div>

    <!-- Loading -->
    <ng-container *ngIf="state === 'loading'">
        <div class="card grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
            <div *ngFor="let _ of [1,2,3]" class="flex flex-col items-center gap-2 p-4 border border-surface-200 dark:border-surface-700 rounded-xl">
                <p-skeleton width="5rem" height="0.7rem"></p-skeleton>
                <p-skeleton width="8rem" height="2.5rem"></p-skeleton>
                <p-skeleton width="3rem" height="0.6rem"></p-skeleton>
            </div>
        </div>
        <div class="card grid grid-cols-1 md:grid-cols-2 gap-5">
            <div *ngFor="let _ of [1,2]">
                <p-skeleton width="6rem" height="0.7rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="100%" height="2.5rem"></p-skeleton>
            </div>
            <div class="md:col-span-2">
                <p-skeleton width="5rem" height="0.7rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="100%" height="5rem"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <!-- Error -->
    <ng-container *ngIf="state === 'error'">
        <div class="card flex flex-col items-center justify-center py-16 text-center gap-3">
            <i class="pi pi-exclamation-triangle text-4xl text-red-500"></i>
            <p class="text-sm text-muted-color m-0">โหลดข้อมูลไม่สำเร็จ</p>
            <p-button label="ลองใหม่" icon="pi pi-refresh" variant="text" (click)="reload()" [fluid]="false"></p-button>
        </div>
    </ng-container>

    <!-- Loaded -->
    <ng-container *ngIf="state === 'loaded'">

        <!-- Stat inputs -->
        <div class="stat-inputs card !mb-6">
            <div class="stat-field">
                <span class="stat-emoji">📝</span>
                <label class="stat-label">คำที่เขียน</label>
                <p-inputNumber
                    [(ngModel)]="entry.words"
                    [min]="0"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="0">
                </p-inputNumber>
                <span class="stat-unit">คำ</span>
            </div>
            <div class="stat-field">
                <span class="stat-emoji">⏱</span>
                <label class="stat-label">ระยะเวลาโฟกัส</label>
                <p-inputNumber
                    [(ngModel)]="entry.focusMinutes"
                    [min]="0"
                    [max]="480"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="0">
                </p-inputNumber>
                <span class="stat-unit">นาที</span>
            </div>
            <div class="stat-field">
                <span class="stat-emoji">🔁</span>
                <label class="stat-label">จำนวน Sessions</label>
                <p-inputNumber
                    [(ngModel)]="entry.sessions"
                    [min]="1"
                    [max]="20"
                    styleClass="w-full"
                    inputStyleClass="w-full text-center text-3xl font-bold h-14"
                    placeholder="1">
                </p-inputNumber>
                <span class="stat-unit">ครั้ง</span>
            </div>
        </div>

        <!-- Chapter + Flow -->
        <div class="card !mb-6 grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="text-xs font-semibold mb-1.5 block">ตอนที่กำลังเขียน</label>
                <p-select
                    [(ngModel)]="entry.chapterId"
                    [options]="chapterOptions"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="เลือกตอน (ไม่บังคับ)"
                    [filter]="chapterOptions.length > 5"
                    styleClass="w-full">
                </p-select>
            </div>
            <div>
                <label class="text-xs font-semibold mb-1.5 block">การไหลของงานเขียน</label>
                <div class="flow-row">
                    <button
                        *ngFor="let f of flowOptions"
                        type="button"
                        class="flow-btn"
                        [class.active]="entry.flow === f.value"
                        (click)="setFlow(f.value)">
                        <span class="text-xl">{{ f.emoji }}</span>
                        <span class="text-xs font-semibold">{{ f.label }}</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Note -->
        <div class="card !mb-6">
            <label class="text-xs font-semibold mb-1.5 block">โน้ต / บันทึกส่วนตัว</label>
            <textarea
                pTextarea
                [(ngModel)]="entry.note"
                rows="5"
                class="w-full"
                placeholder="บันทึกความรู้สึก ปัญหาที่เจอ หรือไอเดียใหม่ๆ วันนี้...">
            </textarea>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3">
            <p-button label="Cancel" (click)="back()" [fluid]="false" outlined></p-button>
            <p-button
                icon="pi pi-save"
                [label]="isEditing ? 'บันทึกการแก้ไข' : 'Save'"
                [loading]="saving"
                (click)="submit()"
                [fluid]="false">
            </p-button>
        </div>
    </ng-container>

</div>
