<div [class]="embedded ? 'inkquest-rings' : 'card !mb-0 inkquest-rings'">
    <div *ngIf="!embedded" class="rings-header">
        <div>
            <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0">Today's Progress</h2>
            <p class="rings-next-step">{{ nextStepText }}</p>
        </div>
        <span class="score-pill">{{ todayScoreLabel }}</span>
    </div>

    <div class="rings-layout" [class.rings-layout--compact]="compact">

        <!-- ── Hero: words today (large) ────────────── -->
        <div class="hero-progress">
            <div class="ring-canvas" [class.ring-canvas--hero]="!compact" [class.ring-canvas--hero-sm]="compact">
                <circle-progress
                    [percent]="heroRing.percent"
                    [outerStrokeColor]="heroRing.color"
                    [innerStrokeColor]="trackColor"
                    [outerStrokeWidth]="16"
                    [innerStrokeWidth]="16"
                    [space]="-16"
                    [radius]="100"
                    [showBackground]="false"
                    [showTitle]="false"
                    [showSubtitle]="false"
                    [showUnits]="false"
                    [showInnerStroke]="true"
                    [responsive]="true"
                    [animation]="true"
                    [animationDuration]="600"
                    [outerStrokeLinecap]="'round'">
                </circle-progress>
                <div class="ring-center">
                    <span class="ring-value" [class.ring-value--hero]="!compact" [class.ring-value--hero-sm]="compact" [style.color]="heroRing.color">
                        {{ heroRing.centerValue }}
                    </span>
                </div>
            </div>
            <div class="hero-copy">
                <span class="ring-label">{{ heroRing.label }}</span>
                <span class="ring-sub">{{ heroRing.subValue }}</span>
            </div>
        </div>

        <!-- ── Secondary rings ───────────────────────── -->
        <div class="metric-stack">
            <div *ngFor="let r of secondaryRings" class="metric-row">
                <div class="metric-row-header">
                    <span class="ring-label ring-label--top">{{ r.label }}</span>
                    <span class="metric-percent" [style.color]="r.color">{{ r.centerValue }}</span>
                </div>
                <div class="metric-track">
                    <div class="metric-fill" [style.width.%]="r.percent" [style.background-color]="r.color"></div>
                </div>
                <span class="ring-sub metric-sub">{{ r.subValue }}</span>
            </div>
        </div>

    </div>
</div>
