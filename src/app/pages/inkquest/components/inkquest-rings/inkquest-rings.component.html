<div [class]="embedded ? 'inkquest-rings' : 'card !mb-0 inkquest-rings'">
    <div *ngIf="!embedded" class="rings-header">
        <div>
            <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0">Today's Progress</h2>
            <p class="rings-next-step">{{ nextStepText }}</p>
        </div>
        <div class="rings-header-actions">
            <div *ngIf="showViewControls" class="view-controls" (click)="$event.stopPropagation()">
                <div class="view-segment">
                    <button type="button"
                            [class.active]="viewMode === 'summary'"
                            (click)="setViewMode('summary')">
                        Summary
                    </button>
                    <button type="button"
                            [class.active]="viewMode === 'project'"
                            [disabled]="projects.length === 0"
                            (click)="setViewMode('project')">
                        Project
                    </button>
                </div>
                <p-select
                    *ngIf="viewMode === 'project'"
                    [ngModel]="selectedProjectId"
                    [options]="projects"
                    optionLabel="title"
                    optionValue="id"
                    placeholder="Select project"
                    [filter]="projects.length > 5"
                    styleClass="project-select"
                    (ngModelChange)="onProjectChange($event)">
                </p-select>
            </div>
            <span class="score-pill">{{ todayScoreLabel }}</span>
        </div>
    </div>

    <div class="progress-dashboard" [class.progress-dashboard--compact]="compact">

        <div class="hero-panel">
            <div class="hero-topline">
                <span class="hero-label">{{ heroRing.label }}</span>
                <span class="hero-percent" [style.color]="heroRing.color">{{ heroRing.centerValue }}</span>
            </div>

            <div class="hero-number-row">
                <span class="hero-number">{{ heroRing.valueText }}</span>
                <span class="hero-unit">words</span>
            </div>

            <div class="hero-goal">{{ heroRing.subValue }}</div>

            <div class="primary-track">
                <div class="primary-fill" [style.width.%]="heroRing.percent"></div>
            </div>

            <div class="hero-foot">
                <span>{{ nextStepText }}</span>
            </div>
        </div>

        <div class="metric-panel">
            <div class="score-tile">
                <span class="score-label">Day Score</span>
                <strong>{{ todayScoreLabel }}</strong>
            </div>

            <div *ngFor="let r of secondaryRings" class="metric-row" [ngClass]="r.toneClass">
                <div class="metric-row-header">
                    <span class="ring-label ring-label--top">{{ r.label }}</span>
                    <span class="metric-percent">{{ r.centerValue }}</span>
                </div>
                <div class="metric-track">
                    <div class="metric-fill" [style.width.%]="r.percent"></div>
                </div>
                <span class="ring-sub metric-sub">{{ r.subValue }}</span>
            </div>
        </div>

    </div>
</div>
