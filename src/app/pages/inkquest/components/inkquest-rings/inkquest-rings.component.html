<div class="card !mb-0 inkquest-rings">
    <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0 mb-5">Today's Progress</h2>

    <div class="rings-row">

        <!-- ── Hero: Today Score (large) ────────────── -->
        <div class="ring-tile ring-tile--hero">
            <div class="ring-canvas ring-canvas--hero">
                <p-chart type="doughnut" [data]="heroRing.data" [options]="options"></p-chart>
                <div class="ring-center">
                    <span class="ring-value ring-value--hero" [style.color]="heroRing.color">
                        {{ heroRing.centerValue }}
                    </span>
                </div>
            </div>
            <span class="ring-label">{{ heroRing.label }}</span>
        </div>

        <!-- ── Secondary rings ───────────────────────── -->
        <div *ngFor="let r of secondaryRings" class="ring-tile ring-tile--secondary">
            <span class="ring-label ring-label--top">{{ r.label }}</span>
            <div class="ring-canvas ring-canvas--sm">
                <p-chart type="doughnut" [data]="r.data" [options]="options"></p-chart>
                <div class="ring-center">
                    <span class="ring-value ring-value--sm" [style.color]="r.color">
                        {{ r.centerValue }}
                    </span>
                </div>
            </div>
            <span class="ring-sub">{{ r.subValue }}</span>
        </div>

    </div>
</div>
