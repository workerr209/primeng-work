<div class="card !mb-0 inkquest-heatmap">

    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0">Heatmap</h2>
        <div class="flex items-center gap-3 text-xs text-muted-color">
            <span class="legend-chip"><span class="dot" [style.background]="color('good')"></span>Good</span>
            <span class="legend-chip"><span class="dot" [style.background]="color('fair')"></span>Fair</span>
            <span class="legend-chip"><span class="dot" [style.background]="color('poor')"></span>Poor</span>
        </div>
    </div>

    <div class="heatmap-scroll">
        <div class="heatmap-grid">

            <!-- Month labels row -->
            <div class="row month-row">
                <div class="weekday-label"></div>
                <ng-container *ngFor="let _ of rows[0]; let c = index">
                    <div class="cell month-label">
                        <ng-container *ngFor="let lbl of monthLabels">
                            <span *ngIf="lbl.col === c">{{ lbl.label }}</span>
                        </ng-container>
                    </div>
                </ng-container>
            </div>

            <!-- Day-of-week rows -->
            <div *ngFor="let row of rows; let r = index" class="row">
                <div class="weekday-label">{{ weekdays[r] }}</div>
                <div *ngFor="let cell of row"
                     class="cell"
                     [style.background-color]="color(cell.quality)"
                     [title]="cell.date"></div>
            </div>

        </div>
    </div>

    <div class="flex justify-end items-center gap-2 mt-3 text-xs text-muted-color">
        <span>Legend</span>
        <div class="legend-bar">
            <span class="bar-segment" [style.background]="color('good')"></span>
            <span class="bar-segment" [style.background]="color('fair')"></span>
            <span class="bar-segment" [style.background]="color('poor')"></span>
        </div>
        <span class="legend-end">
            <span [style.color]="color('good')">Good</span>
            <span class="mx-1">·</span>
            <span [style.color]="color('fair')">Fair</span>
            <span class="mx-1">·</span>
            <span [style.color]="color('poor')">Poor</span>
        </span>
    </div>

</div>
