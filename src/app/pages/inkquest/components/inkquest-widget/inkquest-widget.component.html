<div class="card !mb-8 inkquest-widget">

    <div class="widget-header">
        <div class="widget-title-group">
            <div class="widget-icon">
                <i class="pi pi-pencil text-primary-500"></i>
            </div>
            <div>
                <h2>Ink Quest</h2>
                <p>Today's writing snapshot</p>
            </div>
        </div>
        <p-button
            *ngIf="showRedirectButton && state === 'loaded'"
            [routerLink]="inkquestRoute"
            icon="pi pi-arrow-right"
            [rounded]="true"
            [text]="true"
            ariaLabel="Open Ink Quest overview"
            [fluid]="false"
            size="small">
        </p-button>
    </div>

    <ng-container *ngIf="state === 'loading' && showSkeleton">
        <div class="widget-skeleton">
            <div class="widget-skeleton-hero">
                <p-skeleton width="6rem" height="0.7rem"></p-skeleton>
                <p-skeleton width="11rem" height="3.2rem"></p-skeleton>
                <p-skeleton width="100%" height="0.65rem" borderRadius="999px"></p-skeleton>
            </div>
            <div class="widget-skeleton-grid">
                <div *ngFor="let _ of [1,2]" class="widget-skeleton-metric">
                    <p-skeleton width="3rem" height="0.6rem"></p-skeleton>
                    <p-skeleton width="4rem" height="1.25rem"></p-skeleton>
                </div>
            </div>
            <div class="widget-skeleton-project">
                <p-skeleton width="7rem" height="0.65rem"></p-skeleton>
                <p-skeleton width="70%" height="1rem"></p-skeleton>
                <p-skeleton width="100%" height="0.55rem" borderRadius="999px"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <ng-container *ngIf="state === 'empty'">
        <div class="widget-state">
            <div class="state-icon">
                <i class="pi pi-book"></i>
            </div>
            <h3>Nothing logged today</h3>
            <p>Log your session to see today's stats.</p>
            <p-button
                label="Open Ink Quest"
                [routerLink]="inkquestRoute"
                [fluid]="false"
                size="small"
                variant="outlined">
            </p-button>
        </div>
    </ng-container>

    <ng-container *ngIf="state === 'error'">
        <div class="widget-state">
            <div class="state-icon state-icon-error">
                <i class="pi pi-exclamation-triangle"></i>
            </div>
            <h3>Couldn't load Ink Quest</h3>
            <p-button label="Retry" variant="text" [fluid]="false" (click)="reload()"></p-button>
        </div>
    </ng-container>

    <ng-container *ngIf="state === 'loaded' && summary as s">
        <app-inkquest-rings
                [summary]="s"
                [embedded]="true"
                [compact]="true">
        </app-inkquest-rings>
        <a *ngIf="s.currentProject as proj"
             [routerLink]="[inkquestRoute + '/projects', proj.id]"
             class="project-card-link">
            <div class="project-card-top">
                <span>Current Project</span>
                <strong>{{ proj.progressPercent }}%</strong>
            </div>
            <h4>{{ proj.title }}</h4>
            <div class="project-track">
                <div class="project-fill" [style.width.%]="proj.progressPercent"></div>
            </div>
            <div class="project-meta">
                <span>{{ proj.finishedChapters }} / {{ proj.totalChapters }} chapters</span>
                <span *ngIf="s.currentChapter">
                    Working on {{ s.currentChapter.title }}
                </span>
            </div>
        </a>

    </ng-container>

</div>
