<p-dialog
    [(visible)]="visible"
    (visibleChange)="onVisibleChange($event)"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [dismissableMask]="true"
    [style]="{ width: '32rem' }"
    [header]="'📕 บันทึกความคืบหน้าวันนี้'"
    styleClass="inkquest-entry-dialog">

    <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
            <label class="text-xs font-semibold text-surface-700 dark:text-surface-200 mb-1.5 block">Words Today</label>
            <p-inputNumber
                [(ngModel)]="entry.words"
                placeholder="เช่น 750"
                [min]="0"
                styleClass="w-full"
                inputStyleClass="w-full"></p-inputNumber>
        </div>
        <div>
            <label class="text-xs font-semibold text-surface-700 dark:text-surface-200 mb-1.5 block">Focus Time (min)</label>
            <p-inputNumber
                [(ngModel)]="entry.focusMinutes"
                placeholder="เช่น 45"
                [min]="0"
                styleClass="w-full"
                inputStyleClass="w-full"></p-inputNumber>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
            <label class="text-xs font-semibold text-surface-700 dark:text-surface-200 mb-1.5 block">Select Chapter</label>
            <p-select
                [(ngModel)]="entry.chapterId"
                [options]="chapterOptions"
                optionLabel="label"
                optionValue="value"
                placeholder="เลือกตอน"
                [filter]="true"
                styleClass="w-full"></p-select>
        </div>
        <div>
            <label class="text-xs font-semibold text-surface-700 dark:text-surface-200 mb-1.5 block">Writing Flow</label>
            <div class="flex gap-2">
                <button
                    *ngFor="let f of flowOptions"
                    type="button"
                    (click)="setFlow(f.value)"
                    class="flow-btn"
                    [class.active]="entry.flow === f.value">
                    <span class="text-lg">{{ f.emoji }}</span>
                    <span class="text-[10px] uppercase tracking-wider">{{ f.label }}</span>
                </button>
            </div>
        </div>
    </div>

    <button
        pButton pRipple
        type="button"
        class="w-full"
        [disabled]="saving"
        [loading]="saving"
        label="[ บันทึกและอัปเดตสถิติ ]"
        (click)="onSave()"></button>

</p-dialog>
