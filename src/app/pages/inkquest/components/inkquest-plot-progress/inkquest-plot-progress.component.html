<div class="card !mb-0 inkquest-plot-progress">

    <ng-container *ngIf="project; else noProject">

        <!-- Card header: title + "View Project" link -->
        <div class="flex items-start justify-between gap-3 mb-4">
            <div class="min-w-0">
                <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0 mb-0.5">Story Progress</h2>
                <p class="text-sm text-muted-color m-0 truncate">📕 {{ project.title }}</p>
            </div>
            <p-button
                    text
                    size="small"
                    class="ml-1"
                    label="View Project"
                    (click)="onProjectClick()"
                    [fluid]="false">
            </p-button>
        </div>

        <!-- Overall progress bar -->
        <div class="mb-5">
            <div class="flex justify-between items-center mb-1.5">
                <span class="text-xs text-muted-color">Overall Completion</span>
                <span class="text-xs font-semibold text-muted-color">
                    {{ project.progressPercent }}% · {{ project.finishedChapters }}/{{ project.totalChapters }} chapters
                </span>
            </div>
            <div class="h-2 bg-surface-200 dark:bg-surface-700 rounded-full overflow-hidden">
                <div class="h-full rounded-full bg-primary-500 transition-all duration-700"
                     [style.width.%]="project.progressPercent"></div>
            </div>
        </div>

        <!-- Chapter arc -->
        <div class="checklist">
            <ng-container *ngFor="let item of checklist; let last = last">
                <div class="checklist-node">
                    <div class="checklist-dot"
                         [style.background-color]="item.status === 'finished' ? statusColor(item.status) : 'transparent'"
                         [style.border-color]="statusColor(item.status)">
                        <i *ngIf="item.status === 'finished'" class="pi pi-check text-white text-[10px]"></i>
                        <i *ngIf="item.status === 'writing'" class="pi pi-circle-fill text-[10px]"
                           [style.color]="statusColor(item.status)"></i>
                    </div>
                    <div class="checklist-label">{{ item.label }}</div>
                    <div *ngIf="item.sub" class="checklist-sub" [style.color]="statusColor(item.status)">
                        {{ item.sub }}
                    </div>
                </div>
                <div *ngIf="!last" class="checklist-line"></div>
            </ng-container>
        </div>

    </ng-container>

    <ng-template #noProject>
        <h2 class="text-xl font-bold text-surface-900 dark:text-surface-0 m-0 mb-3">Story Progress</h2>
        <div class="flex flex-col items-center justify-center py-8 text-center text-muted-color">
            <i class="pi pi-book text-3xl mb-2"></i>
            <p class="text-sm m-0">No active project</p>
        </div>
    </ng-template>

</div>
